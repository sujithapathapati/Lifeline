<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifeline - Emergency Blood Request</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #2d3748;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        header .logo {
            display: flex;
            align-items: center;
        }

        header .logo img {
            height: 30px;
            margin-right: 10px;
        }

        header .logo h1 {
            font-size: 20px;
            font-weight: 700;
            color: #e53e3e;
            margin: 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #4a5568;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: #e53e3e;
        }

        .sign-in-btn {
            background-color: #e53e3e;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-size: 14px;
        }

        .sign-in-btn:hover {
            background-color: #c53030;
            transform: translateY(-2px);
        }

        .sign-in-btn:active {
            transform: translateY(0);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        #emergency-request-header {
            text-align: center;
            margin-bottom: 30px;
        }

        #emergency-request-header h2 {
            font-size: 24px;
            font-weight: 600;
            color: #e53e3e;
            margin-bottom: 10px;
        }

        #emergency-request-header p {
            font-size: 16px;
            color: #4a5568;
            line-height: 1.7;
            max-width: 80%;
            margin: 0 auto;
        }



        form {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        form .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        form input[type="text"],
        form select,
        form input[type="tel"],
        form input[type="date"],
        form input[type="time"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        form input[type="text"]:focus,
        form select:focus,
        form input[type="tel"]:focus,
        form input[type="date"]:focus,
        form input[type="time"]:focus {
            outline: none;
            border-color: #e53e3e;
            box-shadow: 0 0 0 2px rgba(229, 62, 62, 0.2);
        }

        form textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s ease;
            resize: vertical;
        }

        form textarea:focus {
            outline: none;
            border-color: #e53e3e;
            box-shadow: 0 0 0 2px rgba(229, 62, 62, 0.2);
        }

        form .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        form input[type="checkbox"] {
            height: 20px;
            width: 20px;
        }

        form button {
            background-color: #e53e3e;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        form button:hover {
            background-color: #c53030;
            transform: translateY(-2px);
        }

        form button:active {
            transform: translateY(0);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        .lifeline-section{
            text-align: center;
            margin-top: 20px;
             padding: 20px;
            border-top: 1px solid #e2e8f0;
        }
       .donors-recepients{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;

        }
        .donors-recepients a{
            text-decoration: none;
            color: #4a5568;
             font-weight: 600;
        }
         .donors-recepients a:hover{
            color: #e53e3e;
        }

    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Lifeline Logo">
            <h1>Lifeline</h1>
        </div>
        <nav>
            <ul>
                <li><a href="d.html">Home</a></li>
                <li><a href="finddonors.html">Find Donors</a></li>
                <li><a href="index1.html">Emergency</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
        <a href="signin.html" class="sign-in-btn">Sign In</a>
    </header>

    <div class="container">
        <div id="emergency-request-header">
            <h2>Emergency Blood Request</h2>
            <p>Submit an urgent request for blood donation. Emergency requests are prioritized and sent to all compatible donors in your area.</p>
        </div>



        <form>
            <div class="form-group">
                <label for="patient-name">Patient Name</label>
                <input type="text" id="patient-name" name="patient-name" placeholder="Full name">
            </div>
            <div class="form-group">
                <label for="blood-type">Blood Type Needed</label>
                <select id="blood-type" name="blood-type">
                    <option value="">Select blood type</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>
            <div class="form-group">
                <label for="hospital-location">Hospital/Location</label>
                <input type="text" id="hospital-location" name="hospital-location" placeholder="Hospital name or address">
            </div>
            <div class="form-group">
                <label for="contact-phone">Contact Phone</label>
                <input type="tel" id="contact-phone" name="contact-phone" placeholder="Phone number">
            </div>
            <div class="form-group">
                <label for="required-date">Required Date</label>
                <input type="date" id="required-date" name="required-date">
            </div>
            <div class="form-group">
                <label for="required-time">Required Time</label>
                <input type="time" id="required-time" name="required-time">
            </div>
            <div class="form-group">
                <label for="additional-info">Additional Information</label>
                <textarea id="additional-info" name="additional-info" rows="4" placeholder="Please provide any additional details that might be helpful for potential donors..."></textarea>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="urgent-request" name="urgent-request">
                <label for="urgent-request">This is an urgent request (within 24 hours)</label>
            </div>
            <button type="submit">Continue</button>
        </form>
         <div class="lifeline-section">
        <div class="logo">
            <img src="logo.png" alt="Lifeline Logo">

        </div>
        <div class="donors-recepients">
            <a href="#">Donors</a>
            <a href="#">Recipients</a>
            <a href="#">Community</a>
        </div>
    </div>
    </div>
</body>
</html>
